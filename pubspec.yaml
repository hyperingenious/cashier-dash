name: cashier_dash
description: Restaurant cashier dashboard with table, menu, order, and billing flows.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  dio: ^5.8.0
  flutter_secure_storage: ^10.0.0
  google_fonts: ^8.0.2
  provider: ^6.1.5
  decimal: ^3.2.4
  web_socket_channel: ^2.4.0
  printing: ^5.14.3
  pdf: ^3.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
